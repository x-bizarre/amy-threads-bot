name: Publish pending replies

# Пингует /api/cron/publish-pending на Vercel каждую минуту.
# Публикует одобренные черновики ответов с 5-минутной задержкой.
# Минимальный шаг GitHub Actions — 5 минут, но фактически запускается быстрее
# если несколько workflow'ов.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping publish-pending
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -eu
          code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${VERCEL_URL}/api/cron/publish-pending")
          echo "HTTP ${code}"
          cat /tmp/body.txt
          test "${code}" = "200"
