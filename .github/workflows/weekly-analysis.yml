name: Weekly castdev analysis

# Запускается раз в неделю (пн 4:00 UTC = 9:00 Tashkent) и по кнопке Run workflow.
# Тянет /api/cron/weekly-analysis на Vercel — Amy анализирует архив комментов,
# выделяет confirmed findings (≥5 разных юзеров) и weak signals, обновляет
# queue/castdev_findings.md, шлёт отчёт в Telegram.
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping weekly-analysis
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -eu
          code=$(curl -sS --max-time 240 -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${VERCEL_URL}/api/cron/weekly-analysis")
          echo "HTTP ${code}"
          cat /tmp/body.txt
          test "${code}" = "200"
