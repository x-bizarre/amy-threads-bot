name: Threads replies watcher

# Пингует /api/cron/replies-watcher на Vercel каждые 5 минут.
# Сделано как GitHub Action, потому что Vercel Hobby plan разрешает cron только раз в день.
# Был 10 минут — ускорили до 5 чтобы Amy быстрее реагировала на комменты.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping replies-watcher
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -eu
          code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${VERCEL_URL}/api/cron/replies-watcher")
          echo "HTTP ${code}"
          cat /tmp/body.txt
          test "${code}" = "200"
